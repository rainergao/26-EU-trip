<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>欧洲行程总入口</title>
  <style>
:root{
  --bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;
  --blue:#2563eb;--blue-soft:#eff6ff;--green:#065f46;--green-bg:#ecfdf5;
  --orange:#9a3412;--orange-bg:#fff7ed;--shadow:0 10px 24px rgba(15,23,42,.06)
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:1100px;margin:0 auto;padding:24px}
.hero{background:linear-gradient(135deg,#1d4ed8,#2563eb 60%,#60a5fa);color:#fff;border-radius:24px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px}
.hero h1{margin:0 0 8px;font-size:30px}
.hero p{margin:0;opacity:.95}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.nav a,.btn{display:inline-block;padding:10px 14px;border-radius:999px;font-weight:700;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff}
.section{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.hd{padding:22px 22px 12px;border-bottom:1px solid var(--line)}
.hd h2{margin:0 0 6px;font-size:26px}
.sub{color:var(--muted);font-size:14px}
.bd{padding:18px 22px 22px}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}
.card h3{margin:0 0 10px;font-size:17px}
.mapph{min-height:120px;border:1px dashed #bfd7ff;border-radius:14px;background:linear-gradient(180deg,#f8fbff,#eef4ff);padding:16px;color:#334155}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{padding:8px 10px;border-radius:10px;font-size:12px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.mini{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}
.k{font-size:12px;color:var(--muted)}
.v{font-weight:700;margin-top:2px}
.timeline{margin-left:8px}
.item{position:relative;padding:0 0 16px 24px;border-left:2px solid #dbeafe}
.item:last-child{padding-bottom:0}
.item:before{content:"";position:absolute;left:-7px;top:6px;width:12px;height:12px;border-radius:999px;background:var(--blue);box-shadow:0 0 0 4px #eff6ff}
.time{color:var(--blue);font-size:13px;font-weight:800;margin-bottom:4px}
.title{font-size:18px;font-weight:800;margin-bottom:4px}
.desc{color:var(--muted);font-size:14px;margin-bottom:8px}
details{margin-top:10px;border:1px solid var(--line);border-radius:14px;background:#fafafa;padding:10px 12px}
summary{cursor:pointer;font-weight:700}
.meta{margin-top:8px;color:#374151;font-size:14px}
.meta strong{color:#111827}
.note{margin-top:16px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:14px 16px}
.budget{margin-top:16px;background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;border-radius:16px;padding:14px 16px}
.hotelgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.footerlink{display:inline-block;margin-top:12px}
@media(max-width:900px){.wrap{padding:16px}.grid,.stats,.hotelgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>欧洲行程总入口</h1>
      <p>完整网页版入口。上传到 GitHub Pages 后，手机只需打开一个网址。</p>

    </div>
    
<div class="section">
  <div class="hd">
    <h2>行程入口</h2>
    <div class="sub">按天拆分，手机打开更稳定，信息保持完整。</div>
  </div>
  <div class="bd">
    <div class="stats">
      <div class="mini"><div class="k">Day 1</div><div class="v"><a href="day-1-06-03-vienna-to-rome.html">06-03 Vienna → Rome</a></div></div>
      <div class="mini"><div class="k">Day 2</div><div class="v"><a href="day-2-06-04-rome.html">06-04 Rome</a></div></div>
      <div class="mini"><div class="k">Day 3</div><div class="v"><a href="day-3-06-05-rome-to-venice.html">06-05 Rome → Venice</a></div></div>
      <div class="mini"><div class="k">Day 4</div><div class="v"><a href="day-4-06-06-venice.html">06-06 Venice</a></div></div>
    </div>
  </div>
</div>

  </div>
</body>
</html>
